<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 24px;
        border: 1px solid #334155;
        background: #0f172a;
        border-radius: 12px;
        padding: 28px;
        text-align: center;
      }
      a {
        color: #22d3ee;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Thanks! Your message has been sent.</h1>
      <p>I will get back to you soon.</p>
      <p><a href="/">Back to portfolio</a></p>
    </div>
  </body>
</html>
